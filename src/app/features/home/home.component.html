<div class="header card">

  <div class="header-top">

    <div class="left">
      <div class="greeting">
        {{ userEmail === 'a@mail.com' ? 'Welcome Back A' : 'Hey B 😏' }}
      </div>

      <div *ngIf="userEmail === 'b@mail.com'"
          class="message"
          (click)="loadMessage()">
        {{ message }}
      </div>
    </div>

    <div class="right">
      <button *ngIf="userEmail === 'a@mail.com'"
        class="btn"
        (click)="openMessagePanel = true">
        Manage
      </button>

      <button class="btn" (click)="logout()">
        Logout
      </button>
    </div>

  </div>

</div>

<!-- GROUPS -->
<app-group-card
  *ngFor="let group of groups"
  [group]="group">
</app-group-card>

<!-- FAB -->
<button class="fab" (click)="openGroupSheet = true">
  +
</button>

<!-- MESSAGE PANEL -->
<div class="bottom-sheet" [class.show]="openMessagePanel">

  <div class="sheet-content">

    <h3>Manage Messages</h3>

    <div *ngFor="let m of messages" class="list-item">
      <span>{{ m.message }}</span>

      <button (click)="editMessage(m)">✏️</button>
      <button (click)="deleteMessage(m.id)">🗑</button>
    </div>

    <input [(ngModel)]="newMessage" placeholder="New message">

    <button class="btn btn-primary"
      (click)="editingId ? updateMessage() : addMessage()">
      {{ editingId ? 'Update' : 'Add' }}
    </button>

    <button class="btn" (click)="closeMessagePanel()">Close</button>

  </div>

</div>
<!-- CREATE GROUP SHEET -->
<div class="bottom-sheet" [class.show]="openGroupSheet">

  <div class="sheet-content">

    <h3>Create Group</h3>

    <input [(ngModel)]="newGroup.name" placeholder="Group name">

    <input type="date" [(ngModel)]="newGroup.from">

    <input type="date" [(ngModel)]="newGroup.to">

    <div style="display:flex; gap:10px;">
      <button class="btn btn-primary" (click)="createGroup()">
        Create
      </button>

      <button class="btn" (click)="openGroupSheet = false">
        Cancel
      </button>
    </div>

  </div>

</div>
